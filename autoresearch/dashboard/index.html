<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoResearch Eval Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --card:        #161b22;
      --border:      #30363d;
      --text:        #e1e4e8;
      --text-muted:  #8b949e;
      --green:       #3fb950;
      --yellow:      #d29922;
      --red:         #f85149;
      --blue:        #58a6ff;
      --radius:      12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    header .subtitle {
      color: var(--text-muted);
      font-size: 13px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Iteration Selector ── */
    .iter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .iter-bar label {
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-right: 4px;
    }

    .iter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .iter-btn:hover { background: #21262d; border-color: var(--blue); }
    .iter-btn.active { background: #1f3a5f; border-color: var(--blue); color: var(--blue); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .section-num {
      background: var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ── Section 1: Scorecard ── */
    .scorecard-layout {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      align-items: start;
    }

    .score-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 28px;
      min-width: 140px;
      gap: 4px;
    }

    .score-badge .big-score {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
    }

    .score-badge .score-denom {
      font-size: 16px;
      color: var(--text-muted);
    }

    .score-badge .score-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 8px;
      margin-top: 6px;
    }

    .score-pass { color: var(--green); border-color: var(--green); }
    .score-fail { color: var(--red); border-color: var(--red); }
    .score-warn { color: var(--yellow); border-color: var(--yellow); }

    .badge-pass .score-label { background: rgba(63,185,80,.15); color: var(--green); }
    .badge-fail .score-label { background: rgba(248,81,73,.15); color: var(--red); }
    .badge-warn .score-label { background: rgba(210,153,34,.15); color: var(--yellow); }

    .radar-wrap {
      position: relative;
      max-width: 380px;
      justify-self: center;
    }

    /* ── Metrics Table ── */
    .metrics-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .metrics-table th {
      text-align: left;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .metrics-table td {
      padding: 9px 10px;
      border-bottom: 1px solid #1e252e;
      vertical-align: middle;
    }

    .metrics-table tr.metric-row {
      cursor: pointer;
      transition: background .12s;
    }

    .metrics-table tr.metric-row:hover { background: #1e252e; }
    .metrics-table tr.metric-row.selected { background: #1f2d40; }

    .score-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 22px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .score-3 { background: rgba(63,185,80,.2); color: var(--green); }
    .score-2 { background: rgba(210,153,34,.2); color: var(--yellow); }
    .score-1 { background: rgba(248,81,73,.2); color: var(--red); }
    .score-0 { background: rgba(248,81,73,.2); color: var(--red); }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .status-pass { background: rgba(63,185,80,.15); color: var(--green); }
    .status-gap  { background: rgba(248,81,73,.15);  color: var(--red); }
    .status-warn { background: rgba(210,153,34,.15); color: var(--yellow); }

    /* ── Metric Detail Panel ── */
    .detail-panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }

    .detail-panel h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--blue);
    }

    .detail-section {
      margin-bottom: 12px;
    }

    .detail-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .detail-section p {
      color: var(--text);
      font-size: 13px;
    }

    /* ── Section 2: Timeline ── */
    .timeline-wrap {
      position: relative;
      height: 280px;
    }

    /* ── Section 3: Changelog ── */
    .changelog-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cl-entry {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .cl-entry-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .cl-run-id {
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
    }

    .cl-timestamp {
      font-size: 12px;
      color: var(--text-muted);
    }

    .cl-changes {
      color: var(--text);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .cl-gaps {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .gap-tag {
      background: rgba(248,81,73,.12);
      color: var(--red);
      border: 1px solid rgba(248,81,73,.25);
      border-radius: 4px;
      font-size: 11px;
      padding: 2px 7px;
    }

    .cl-diff {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 8px;
      overflow-x: auto;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: .4;
    }

    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      max-width: 320px;
      margin: 0 auto;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .scorecard-layout {
        grid-template-columns: 1fr;
      }
      .score-badge { flex-direction: row; min-width: unset; padding: 14px 18px; }
      .radar-wrap { max-width: 100%; }
      .timeline-wrap { height: 220px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>AutoResearch Eval Dashboard</h1>
    <div class="subtitle">Visualization of automated research evaluation reports</div>
  </div>
</header>

<div class="container" id="app">
  <!-- Filled by JS -->
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────

const METRIC_LABELS = [
  'Direction Quality', 'Insight Novelty', 'Query Efficiency',
  'Context Boundary', 'Uncertainty', 'Data Quality',
  'Segmentation', 'Actionability', 'Follow-up',
  'Simplicity', 'Narrative', 'Success Metrics'
];

const METRIC_KEYS = [
  'direction-quality', 'insight-novelty', 'query-efficiency',
  'context-boundary', 'uncertainty', 'data-quality',
  'segmentation', 'actionability', 'followup',
  'simplicity', 'narrative', 'success-metrics'
];

// ── State ──────────────────────────────────────────────────────────────────

let state = {
  changelog: null,
  reports: [],
  selectedIndex: 0,
  selectedMetricKey: null,
};

let radarChart = null;
let timelineChart = null;

// ── Utilities ──────────────────────────────────────────────────────────────

function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function scoreColor(score) {
  if (score >= 3) return '#3fb950';
  if (score >= 2) return '#d29922';
  return '#f85149';
}

function totalScore(report) {
  if (!report?.metrics) return 0;
  return METRIC_KEYS.reduce((sum, k) => {
    const m = report.metrics[k];
    return sum + (m?.score ?? 0);
  }, 0);
}

// ── Data Loading ───────────────────────────────────────────────────────────

async function loadData() {
  let changelog;
  try {
    const res = await fetch('../changelog.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    changelog = await res.json();
  } catch (_) {
    changelog = { iterations: [] };
  }

  state.changelog = changelog;
  const iterations = changelog?.iterations ?? [];

  const reports = await Promise.all(
    iterations.map(async (iter) => {
      if (!iter.runId) return null;
      try {
        const res = await fetch(`../reports/run-${escHtml(iter.runId)}.json`);
        if (!res.ok) return null;
        return await res.json();
      } catch (_) {
        return null;
      }
    })
  );

  state.reports = reports;
  render();
}

// ── Rendering ──────────────────────────────────────────────────────────────

function render() {
  const app = document.getElementById('app');
  const iterations = state.changelog?.iterations ?? [];

  if (iterations.length === 0) {
    app.innerHTML = renderEmpty();
    return;
  }

  app.innerHTML = `
    ${renderIterBar(iterations)}
    ${renderScorecard()}
    ${renderTimelineSection()}
    ${renderChangelogSection()}
  `;

  mountRadarChart();
  mountTimelineChart();
  bindMetricRows();
}

function renderEmpty() {
  return `
    <div class="empty-state">
      <div class="empty-icon">&#128202;</div>
      <h3>No eval reports yet</h3>
      <p>Run the AutoResearch orchestrator to generate evaluation reports. They will appear here automatically.</p>
    </div>
  `;
}

// ── Iteration Selector ─────────────────────────────────────────────────────

function renderIterBar(iterations) {
  const btns = iterations.map((iter, i) => {
    const label = iter.runId ? `Run ${escHtml(iter.runId)}` : `Iter ${i + 1}`;
    const active = i === state.selectedIndex ? 'active' : '';
    return `<button class="iter-btn ${active}" onclick="selectReport(${i})">${label}</button>`;
  }).join('');

  return `<div class="iter-bar"><label>Iteration:</label>${btns}</div>`;
}

// ── Section 1: Scorecard ───────────────────────────────────────────────────

function renderScorecard() {
  const report = state.reports[state.selectedIndex];
  const total = totalScore(report);
  const badgeClass = total >= 36 ? 'badge-pass' : total >= 30 ? 'badge-warn' : 'badge-fail';
  const labelText = total >= 36 ? 'PASS' : total >= 30 ? 'NEAR' : 'FAIL';
  const bigClass = total >= 36 ? 'score-pass' : total >= 30 ? 'score-warn' : 'score-fail';

  return `
    <div class="card">
      <div class="card-title">
        <span class="section-num">01</span> Scorecard
      </div>
      <div class="scorecard-layout">
        <div class="score-badge ${badgeClass}">
          <div class="big-score ${bigClass}">${report ? total : '—'}</div>
          <div class="score-denom">/ 36</div>
          <div class="score-label">${report ? labelText : 'NO DATA'}</div>
        </div>
        <div class="radar-wrap">
          <canvas id="radarChart"></canvas>
        </div>
      </div>
      ${renderMetricsTable(report)}
      <div id="metricDetail"></div>
    </div>
  `;
}

function renderMetricsTable(report) {
  const rows = METRIC_KEYS.map((key, i) => {
    const m = report?.metrics?.[key];
    const score = m?.score ?? null;
    const label = METRIC_LABELS[i];
    const chipClass = score != null ? `score-${Math.min(score, 3)}` : 'score-0';
    const scoreDisplay = score != null ? score : '—';
    const statusClass = score == null ? 'status-gap' : score >= 3 ? 'status-pass' : score >= 2 ? 'status-warn' : 'status-gap';
    const statusText = score == null ? 'NO DATA' : score >= 3 ? 'PASS' : 'GAP';
    const selected = key === state.selectedMetricKey ? 'selected' : '';

    return `
      <tr class="metric-row ${selected}" data-key="${escHtml(key)}">
        <td>${escHtml(label)}</td>
        <td><span class="score-chip ${chipClass}">${scoreDisplay}</span> <span style="color:var(--text-muted);font-size:12px">/ 3</span></td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
      </tr>
    `;
  }).join('');

  return `
    <table class="metrics-table">
      <thead>
        <tr>
          <th>Metric</th>
          <th>Score</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function bindMetricRows() {
  document.querySelectorAll('.metric-row').forEach(row => {
    row.addEventListener('click', () => showMetricDetail(row.dataset.key));
  });
}

function showMetricDetail(key) {
  if (state.selectedMetricKey === key) {
    state.selectedMetricKey = null;
    refreshMetricTable();
    document.getElementById('metricDetail').innerHTML = '';
    return;
  }
  state.selectedMetricKey = key;
  refreshMetricTable();

  const report = state.reports[state.selectedIndex];
  const m = report?.metrics?.[key];
  const labelIndex = METRIC_KEYS.indexOf(key);
  const label = labelIndex >= 0 ? METRIC_LABELS[labelIndex] : key;

  if (!m) {
    document.getElementById('metricDetail').innerHTML = `
      <div class="detail-panel">
        <h4>${escHtml(label)}</h4>
        <p style="color:var(--text-muted)">No data available for this metric.</p>
      </div>
    `;
    return;
  }

  const evidenceHtml = m.evidence
    ? `<div class="detail-section"><label>Evidence</label><p>${escHtml(m.evidence)}</p></div>`
    : '';

  const gapsHtml = m.gaps
    ? `<div class="detail-section"><label>Gaps</label><p>${escHtml(m.gaps)}</p></div>`
    : '';

  const recHtml = m.recommendation
    ? `<div class="detail-section"><label>Recommendation</label><p>${escHtml(m.recommendation)}</p></div>`
    : '';

  document.getElementById('metricDetail').innerHTML = `
    <div class="detail-panel">
      <h4>${escHtml(label)}</h4>
      ${evidenceHtml}
      ${gapsHtml}
      ${recHtml}
      ${(!evidenceHtml && !gapsHtml && !recHtml)
        ? '<p style="color:var(--text-muted)">No additional details available.</p>'
        : ''}
    </div>
  `;
}

function refreshMetricTable() {
  const report = state.reports[state.selectedIndex];
  const tbody = document.querySelector('.metrics-table tbody');
  if (!tbody) return;
  tbody.innerHTML = METRIC_KEYS.map((key, i) => {
    const m = report?.metrics?.[key];
    const score = m?.score ?? null;
    const label = METRIC_LABELS[i];
    const chipClass = score != null ? `score-${Math.min(score, 3)}` : 'score-0';
    const scoreDisplay = score != null ? score : '—';
    const statusClass = score == null ? 'status-gap' : score >= 3 ? 'status-pass' : score >= 2 ? 'status-warn' : 'status-gap';
    const statusText = score == null ? 'NO DATA' : score >= 3 ? 'PASS' : 'GAP';
    const selected = key === state.selectedMetricKey ? 'selected' : '';
    return `
      <tr class="metric-row ${selected}" data-key="${escHtml(key)}">
        <td>${escHtml(label)}</td>
        <td><span class="score-chip ${chipClass}">${scoreDisplay}</span> <span style="color:var(--text-muted);font-size:12px">/ 3</span></td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
      </tr>
    `;
  }).join('');
  bindMetricRows();
}

// ── Radar Chart ────────────────────────────────────────────────────────────

function mountRadarChart() {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;

  if (radarChart) { radarChart.destroy(); radarChart = null; }

  const report = state.reports[state.selectedIndex];
  const scores = METRIC_KEYS.map(k => report?.metrics?.[k]?.score ?? 0);
  const pointColors = scores.map(s => scoreColor(s));

  radarChart = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: METRIC_LABELS,
      datasets: [
        {
          label: 'Score',
          data: scores,
          backgroundColor: 'rgba(88,166,255,0.15)',
          borderColor: '#58a6ff',
          borderWidth: 2,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 5,
          pointHoverRadius: 7,
        },
        {
          label: 'Target',
          data: METRIC_KEYS.map(() => 3),
          backgroundColor: 'rgba(63,185,80,0.05)',
          borderColor: 'rgba(63,185,80,0.4)',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          pointHoverRadius: 0,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: '#8b949e', font: { size: 11 } }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.dataset.label}: ${ctx.raw}`
          }
        }
      },
      scales: {
        r: {
          min: 0,
          max: 3,
          ticks: {
            stepSize: 1,
            color: '#8b949e',
            backdropColor: 'transparent',
            font: { size: 10 }
          },
          grid: { color: '#30363d' },
          angleLines: { color: '#30363d' },
          pointLabels: { color: '#e1e4e8', font: { size: 11 } }
        }
      }
    }
  });
}

// ── Section 2: Timeline ────────────────────────────────────────────────────

function renderTimelineSection() {
  return `
    <div class="card">
      <div class="card-title">
        <span class="section-num">02</span> Iteration Timeline
      </div>
      <div class="timeline-wrap">
        <canvas id="timelineChart"></canvas>
      </div>
    </div>
  `;
}

function mountTimelineChart() {
  const canvas = document.getElementById('timelineChart');
  if (!canvas) return;

  if (timelineChart) { timelineChart.destroy(); timelineChart = null; }

  const iterations = state.changelog?.iterations ?? [];
  const labels = iterations.map((iter, i) =>
    iter.runId ? `Run ${iter.runId}` : `Iter ${i + 1}`
  );
  const scores = state.reports.map(r => totalScore(r));
  const pointColors = scores.map(s => scoreColor(s));
  const targetData = labels.map(() => 36);

  timelineChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Total Score',
          data: scores,
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88,166,255,0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 6,
          pointHoverRadius: 8,
        },
        {
          label: 'Target (36)',
          data: targetData,
          borderColor: 'rgba(63,185,80,0.5)',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8b949e', font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.dataset.label}: ${ctx.raw} / 36`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8b949e', font: { size: 12 } },
          grid: { color: '#1e252e' }
        },
        y: {
          min: 0,
          max: 36,
          ticks: { color: '#8b949e', font: { size: 12 }, stepSize: 6 },
          grid: { color: '#1e252e' }
        }
      },
      onClick: (_, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          selectReport(idx);
        }
      }
    }
  });
}

// ── Section 3: Changelog ───────────────────────────────────────────────────

function renderChangelogSection() {
  return `
    <div class="card">
      <div class="card-title">
        <span class="section-num">03</span> Change Log
      </div>
      ${renderChangelog()}
    </div>
  `;
}

function renderChangelog() {
  const iterations = state.changelog?.iterations ?? [];
  if (iterations.length === 0) {
    return '<p style="color:var(--text-muted)">No iterations recorded.</p>';
  }

  const reversed = [...iterations].reverse();

  const entries = reversed.map((iter, reversedIdx) => {
    const origIdx = iterations.length - 1 - reversedIdx;
    const report = state.reports[origIdx];
    const score = totalScore(report);
    const badgeClass = score >= 36 ? 'score-pass' : score >= 30 ? 'score-warn' : 'score-fail';

    const timestamp = iter.timestamp
      ? `<span class="cl-timestamp">${escHtml(iter.timestamp)}</span>`
      : '';

    const runLabel = iter.runId
      ? `<span class="cl-run-id">Run ${escHtml(iter.runId)}</span>`
      : `<span class="cl-run-id">Iter ${origIdx + 1}</span>`;

    const scoreChip = report
      ? `<span class="score-chip score-${score >= 36 ? 3 : score >= 30 ? 2 : 0}" style="width:auto;padding:2px 8px;">${score} / 36</span>`
      : '';

    const changesHtml = iter.changes
      ? `<div class="cl-changes">${escHtml(iter.changes)}</div>`
      : '';

    const gaps = iter.gaps ?? [];
    const gapsHtml = gaps.length > 0
      ? `<div class="cl-gaps">${gaps.map(g => `<span class="gap-tag">${escHtml(g)}</span>`).join('')}</div>`
      : '';

    const diffHtml = iter.diff
      ? `<div class="cl-diff">${escHtml(iter.diff)}</div>`
      : '';

    return `
      <div class="cl-entry">
        <div class="cl-entry-header">
          ${runLabel}
          ${timestamp}
          ${scoreChip}
        </div>
        ${changesHtml}
        ${gapsHtml}
        ${diffHtml}
      </div>
    `;
  }).join('');

  return `<div class="changelog-list">${entries}</div>`;
}

// ── Report Selection ───────────────────────────────────────────────────────

function selectReport(index) {
  state.selectedIndex = index;
  state.selectedMetricKey = null;
  render();
}

// ── Bootstrap ─────────────────────────────────────────────────────────────

loadData();
</script>
